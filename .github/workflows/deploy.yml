name: Deploy static site

# Qachon ishga tushadi: main'ga push bo'lganda
on:
  push:
    branches: [main]

# OIDC uchun kerak: token olish huquqi
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Repo kodini olish
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node o'rnatish
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. Kutubxonalarni o'rnatish (lock faylga qat'iy amal qilib)
      - name: Install dependencies
        run: npm ci

      # 4. Saytni build qilish -> dist/
      - name: Build site
        run: npm run build

      # 5. AWS'ga OIDC orqali kirish (kalitsiz!)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      # 6. dist/ ni S3'ga sync qilish
      - name: Sync to S3
        run: aws s3 sync ./dist s3://${{ secrets.S3_BUCKET }} --delete

      # 7. CloudFront keshini tozalash (eng muhim qadam!)
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
