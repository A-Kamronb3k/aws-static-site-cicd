name: Deploy static site

# Runs on every push to main
on:
  push:
    branches: [main]

# Required for OIDC: permission to request the identity token
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. Install dependencies (strictly from the lock file)
      - name: Install dependencies
        run: npm ci

      # 4. Build the site -> dist/
      - name: Build site
        run: npm run build

      # 5. Authenticate to AWS via OIDC (keyless!)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      # 6. Sync dist/ to S3
      - name: Sync to S3
        run: aws s3 sync ./dist s3://${{ secrets.S3_BUCKET }} --delete

      # 7. Invalidate the CloudFront cache (the step everyone forgets)
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
